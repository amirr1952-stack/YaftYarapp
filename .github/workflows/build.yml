name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Capacitor
      run: npm install -g @capacitor/cli @capacitor/android
    
    - name: Build APK
      run: |
        npx cap init "Yaft Yar" "com.yaftyar.app" --web-dir=.
        npx cap add android
        npx cap sync android
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: YaftYar-App
        path: android/app/build/outputs/apk/debug/app-debug.apk

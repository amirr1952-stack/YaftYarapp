name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Build Web App
      run: |
        # ساخت یک فایل APK ساده با وب‌ویو
        mkdir app
        echo '<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>Yaft Yar</title>
        <style>*{margin:0;padding:0;} iframe{width:100%;height:100vh;border:none;}</style>
        </head>
        <body>
        <iframe src="https://yaft-yar.ir"></iframe>
        </body>
        </html>' > app/index.html
    
    - name: Install cordova
      run: npm install -g cordova
    
    - name: Build APK with Cordova
      run: |
        cordova create myapp com.yaftyar.app "Yaft Yar"
        cp app/index.html myapp/www/
        cd myapp
        cordova platform add android
        cordova build android --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: YaftYar-App
        path: myapp/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Create Web App
      run: |
        # ساخت پوشه و فایل HTML
        mkdir -p www
        cat > www/index.html << 'EOF'
        <!DOCTYPE html>
        <html lang="fa">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>یافت یار</title>
            <style>
                * { margin: 0; padding: 0; box-sizing: border-box; }
                body, html { width: 100%; height: 100%; overflow: hidden; }
                iframe { width: 100%; height: 100%; border: none; }
            </style>
        </head>
        <body>
            <iframe src="https://yaft-yar.ir"></iframe>
        </body>
        </html>
        EOF
        
        # ساخت فایل پیکربندی
        cat > package.json << 'EOF'
        {
          "name": "yaft-yar",
          "version": "1.0.0",
          "scripts": {
            "build": "echo 'Build complete'"
          }
        }
        EOF
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
    
    - name: Install and Build with PWABuilder
      run: |
        npm install -g @pwabuilder/pwabuild
        pwabuild package https://yaft-yar.ir --platform android
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: YaftYar-App
        path: |
          **/*.apk
          **/*.aab

name: Build APK

on: 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Make HTML
      run: |
        echo '<!DOCTYPE html>
        <html>
        <head><meta charset="UTF-8"><title>Yaft Yar</title>
        <style>body{margin:0;} iframe{width:100%;height:100vh;border:none;}</style>
        </head>
        <body>
        <iframe src="https://yaft-yar.ir"></iframe>
        </body>
        </html>' > index.html

    - name: Upload HTML
      uses: actions/upload-artifact@v4
      with:
        name: yaftyar-html
        path: index.html
